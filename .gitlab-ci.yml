# COMPATIBILITY STUB — Not the primary CI system.
# The canonical CI pipeline is .github/workflows/ci.yml.
# This file is maintained for teams that mirror this repo into Azure DevOps or GitLab.

stages:
  - validate
  - security
  - build

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

variables:
  PYTHON_VERSION: "3.12"

validate:
  stage: validate
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - python -m pip install --upgrade pip uv
    - uv sync --all-extras --python "$PYTHON_VERSION"
  script:
    - uv run --python "$PYTHON_VERSION" ruff check src/ tests/
    - uv run --python "$PYTHON_VERSION" python -m mypy src/kicad_mcp/
    - uv run --python "$PYTHON_VERSION" python -m pytest tests/unit/ -q

security:
  stage: security
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - python -m pip install --upgrade pip uv
    - uv sync --all-extras --python "$PYTHON_VERSION"
  script:
    - uv run --python "$PYTHON_VERSION" python -m pip_audit --skip-editable --progress-spinner off
    - |
      if [ -n "${DOPPLER_TOKEN:-}" ]; then
        apt-get update && apt-get install -y curl gnupg
        (curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh || wget -t 3 -qO- https://cli.doppler.com/install.sh) | sh
        doppler run --project "${DOPPLER_PROJECT:-all}" --config "${DOPPLER_CONFIG:-main}" -- sh -c 'uv run --python "$PYTHON_VERSION" python -m safety --stage cicd --key "$SAFETY_API_KEY" scan --target .' || true
      else
        echo "DOPPLER_TOKEN is not set; skipping optional Safety scan."
      fi

build:
  stage: build
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - python -m pip install --upgrade pip uv
  script:
    - uv build
  artifacts:
    paths:
      - dist/
    expire_in: 3 days

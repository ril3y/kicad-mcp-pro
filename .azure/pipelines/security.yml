# COMPATIBILITY STUB — Not the primary CI system.
# The canonical CI pipeline is .github/workflows/ci.yml.
# This file is maintained for teams that mirror this repo into Azure DevOps or GitLab.

# ──────────────────────────────────────────────────────────────────────────────
# kicad-mcp-pro · Azure Pipelines — Security
#
# Manual-only by design to avoid background CI/CD cost.
# Run this pipeline on demand when preparing a release or auditing dependencies.
# ──────────────────────────────────────────────────────────────────────────────

trigger: none
pr: none

variables:
  nodeVersion: '24.15.0'

jobs:
  - job: SecurityAudit
    displayName: "Security Audit (manual)"
    pool:
      vmImage: ubuntu-22.04
    timeoutInMinutes: 30
    variables:
      UV_CACHE_DIR: $(Pipeline.Workspace)/.uv-cache

    steps:
      - checkout: self
        fetchDepth: 1

      - task: NodeTool@0
        inputs:
          versionSpec: '$(nodeVersion)'
        displayName: "Use Node.js"

      - bash: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "##vso[task.prependpath]$HOME/.local/bin"
          echo "##vso[task.prependpath]$HOME/.cargo/bin"
        displayName: "Install uv"

      - script: corepack enable
        displayName: "Enable Corepack"

      - script: corepack npm ci
        displayName: "Install Node hook tooling"

      - task: Cache@2
        displayName: "Restore uv cache"
        inputs:
          key: 'uv | "$(Agent.OS)" | uv.lock'
          restoreKeys: |
            uv | "$(Agent.OS)"
          path: $(UV_CACHE_DIR)

      - script: uv sync --all-extras --frozen
        displayName: "Install dependencies"

      - script: |
          uv run python -m bandit \
            -r src/ \
            -ll \
            -s B104 \
            -f json \
            -o bandit-report.json
        displayName: "SAST · bandit (src/)"

      - script: |
          if [ -n "${SAFETY_API_KEY:-}" ]; then
            if ! timeout 15m uv run python -m safety \
              --stage cicd \
              --key "${SAFETY_API_KEY}" \
              scan \
              --target . \
              --output json \
              --continue-on-error \
              2>&1 | tee safety-report.json; then
              echo "Safety scan could not complete cleanly; falling back to pip-audit JSON output."
              timeout 15m uv run python -m pip_audit \
                --skip-editable \
                --progress-spinner off \
                --format json \
                --output safety-report.json
            fi
          else
            echo "SAFETY_API_KEY not set; running pip-audit fallback."
            timeout 15m uv run python -m pip_audit \
              --skip-editable \
              --progress-spinner off \
              --format json \
              --output safety-report.json
          fi
        displayName: "SCA · safety (dependencies)"
        env:
          SAFETY_API_KEY: $(SAFETY_API_KEY)

      - script: uv cache prune --ci || true
        displayName: "Prune uv cache (CI)"
        condition: always()

      - task: PublishBuildArtifacts@1
        displayName: "Publish bandit report"
        condition: always()
        inputs:
          pathtoPublish: bandit-report.json
          artifactName: security-bandit

      - task: PublishBuildArtifacts@1
        displayName: "Publish safety report"
        condition: always()
        inputs:
          pathtoPublish: safety-report.json
          artifactName: security-safety

# COMPATIBILITY STUB — Not the primary CI system.
# The canonical CI pipeline is .github/workflows/ci.yml.
# This file is maintained for teams that mirror this repo into Azure DevOps or GitLab.

# ──────────────────────────────────────────────────────────────────────────────
# kicad-mcp-pro · Azure Pipelines — Lean CI
#
# Manual fallback default:
# - single OS
# - Python 3.12/3.13 validation matrix
# - no separate security job here
#
# Automated GitHub CI/CD runs from the oaslananka-lab mirror.
# Queue this Azure pipeline manually when Azure validation is needed.
# ──────────────────────────────────────────────────────────────────────────────

trigger: none
pr: none

variables:
  nodeVersion: '24.15.0'

jobs:
  - job: Validate
    displayName: 'Validate · Ubuntu · Python $(pythonVersion)'
    pool:
      vmImage: ubuntu-22.04
    timeoutInMinutes: 30
    strategy:
      matrix:
        py312:
          pythonVersion: '3.12'
        py313:
          pythonVersion: '3.13'

    steps:
      - checkout: self
        fetchDepth: 1

      - task: NodeTool@0
        inputs:
          versionSpec: '$(nodeVersion)'
        displayName: 'Use Node.js'

      - bash: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "##vso[task.prependpath]$HOME/.local/bin"
          echo "##vso[task.prependpath]$HOME/.cargo/bin"
        displayName: 'Install uv'

      - script: corepack enable
        displayName: 'Enable Corepack'

      - script: corepack npm ci
        displayName: 'Install Node hook tooling'

      - script: uv python install $(pythonVersion)
        displayName: 'Install Python $(pythonVersion)'

      - script: uv sync --all-extras --frozen --python $(pythonVersion)
        displayName: 'Install dependencies'

      - script: corepack npm run check:ci
        displayName: 'Run local validation gate'

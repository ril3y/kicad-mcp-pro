# COMPATIBILITY STUB — Not the primary CI system.
# The canonical CI pipeline is .github/workflows/ci.yml.
# This file is maintained for teams that mirror this repo into Azure DevOps or GitLab.

trigger: none
pr: none

parameters:
  - name: publishToPackageIndex
    displayName: Publish package from Azure DevOps
    type: string
    default: "false"
    values:
      - "false"
      - "true"
  - name: packageIndex
    displayName: Target package index
    type: string
    default: TestPyPI
    values:
      - TestPyPI
      - PyPI

variables:
  - group: pypi-credentials
  - name: pythonVersion
    value: "3.12"
  - name: nodeVersion
    value: "24.15.0"

stages:
  - stage: Validate
    displayName: Validate
    jobs:
      - job: ubuntu_validate
        displayName: Ubuntu · Ruff, mypy, pytest, and audit
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: Use Node.js

          - script: python -m pip install --upgrade uv
            displayName: Install uv

          - script: corepack enable
            displayName: Enable Corepack

          - script: corepack npm ci
            displayName: Install Node hook tooling

          - script: uv sync --all-extras --frozen --python $(pythonVersion)
            displayName: Sync dependencies

          - script: corepack npm run check:ci
            displayName: Run local validation gate

          - script: corepack npm run security:bandit
            displayName: Run Bandit

          - script: corepack npm run security:audit
            displayName: Run pip-audit

          - script: |
              set -euo pipefail
              if [ -n "${SAFETY_API_KEY:-}" ]; then
                set +e
                uv run --python $(pythonVersion) python -m safety \
                  --stage cicd \
                  --key "${SAFETY_API_KEY}" \
                  scan \
                  --target .
                safety_exit=$?
                set -e
                if [ "${safety_exit}" -ne 0 ]; then
                  echo "Safety scan could not complete cleanly (exit ${safety_exit}); pip-audit remains the enforced SCA gate for this pipeline."
                fi
              else
                echo "SAFETY_API_KEY is not set; pip-audit already ran as the enforced SCA gate."
              fi
            displayName: Run safety when configured
            env:
              SAFETY_API_KEY: $(SAFETY_API_KEY)

          - script: |
              set -euo pipefail
              if [ -n "${DOPPLER_TOKEN:-}" ] && [ "${DOPPLER_TOKEN}" != '$(DOPPLER_TOKEN)' ]; then
                (curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh || wget -t 3 -qO- https://cli.doppler.com/install.sh) | sudo sh
                set +e
                doppler run --project "${DOPPLER_PROJECT:-all}" --config "${DOPPLER_CONFIG:-main}" -- sh -c 'uv run --python $(pythonVersion) python -m safety --stage cicd --key "$SAFETY_API_KEY" scan --target .'
                safety_exit=$?
                set -e
                if [ "${safety_exit}" -ne 0 ]; then
                  echo "Doppler-backed Safety scan could not complete cleanly (exit ${safety_exit}); pip-audit remains the enforced SCA gate for this pipeline."
                fi
              else
                echo "DOPPLER_TOKEN is not set; skipping Doppler-backed Safety scan."
              fi
            displayName: Run safety via Doppler when configured
            env:
              DOPPLER_TOKEN: $(DOPPLER_TOKEN)
              DOPPLER_PROJECT: $(DOPPLER_PROJECT)
              DOPPLER_CONFIG: $(DOPPLER_CONFIG)

      - job: windows_validate
        displayName: Windows · Ruff, mypy, and unit tests
        pool:
          vmImage: windows-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: Use Node.js

          - script: python -m pip install --upgrade uv
            displayName: Install uv

          - script: corepack enable
            displayName: Enable Corepack

          - script: corepack npm ci
            displayName: Install Node hook tooling

          - script: uv sync --all-extras --frozen --python $(pythonVersion)
            displayName: Sync dependencies

          - script: corepack npm run lint
            displayName: Run ruff

          - script: corepack npm run typecheck
            displayName: Run mypy

          - script: corepack npm run test:unit
            displayName: Run unit tests

  - stage: Build
    displayName: Build
    dependsOn: Validate
    jobs:
      - job: package
        displayName: Build wheel and sdist
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: Use Node.js

          - script: python -m pip install --upgrade uv
            displayName: Install uv

          - script: corepack enable
            displayName: Enable Corepack

          - script: corepack npm ci
            displayName: Install Node hook tooling

          - script: corepack npm run build
            displayName: Build package

          - publish: dist
            artifact: python-dist
            displayName: Publish build artifacts

  - stage: Publish
    displayName: Publish
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.publishToPackageIndex }}', 'true'))
    jobs:
      - job: publish_package
        displayName: Publish package
        pool:
          vmImage: ubuntu-latest
        steps:
          - download: current
            artifact: python-dist
            displayName: Download package artifacts

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"

          - script: python -m pip install --upgrade twine
            displayName: Install twine

          - script: |
              set -euo pipefail

              if [ -n "${DOPPLER_TOKEN:-}" ] && [ "${DOPPLER_TOKEN}" != '$(DOPPLER_TOKEN)' ]; then
                (curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh || wget -t 3 -qO- https://cli.doppler.com/install.sh) | sudo sh
                if [ "${{ parameters.packageIndex }}" = "TestPyPI" ]; then
                  doppler run --project "${DOPPLER_PROJECT:-all}" --config "${DOPPLER_CONFIG:-main}" -- sh -c 'python -m twine upload --repository-url https://test.pypi.org/legacy/ -u __token__ -p "$TEST_PYPI_TOKEN" --non-interactive --skip-existing "$(Pipeline.Workspace)/python-dist"/*'
                else
                  doppler run --project "${DOPPLER_PROJECT:-all}" --config "${DOPPLER_CONFIG:-main}" -- sh -c 'python -m twine upload -u __token__ -p "$PYPI_TOKEN" --non-interactive --skip-existing "$(Pipeline.Workspace)/python-dist"/*'
                fi
                exit 0
              fi

              if [ "${{ parameters.packageIndex }}" = "TestPyPI" ]; then
                python -m twine upload \
                  --repository-url https://test.pypi.org/legacy/ \
                  -u __token__ \
                  -p "$TEST_PYPI_TOKEN" \
                  --non-interactive \
                  --skip-existing \
                  "$(Pipeline.Workspace)/python-dist"/*
              else
                python -m twine upload \
                  -u __token__ \
                  -p "$PYPI_TOKEN" \
                  --non-interactive \
                  --skip-existing \
                  "$(Pipeline.Workspace)/python-dist"/*
              fi
            displayName: Publish distribution
            env:
              PYPI_TOKEN: $(PYPI_TOKEN)
              TEST_PYPI_TOKEN: $(TEST_PYPI_TOKEN)
              DOPPLER_TOKEN: $(DOPPLER_TOKEN)
              DOPPLER_PROJECT: $(DOPPLER_PROJECT)
              DOPPLER_CONFIG: $(DOPPLER_CONFIG)

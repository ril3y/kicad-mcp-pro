# COMPATIBILITY STUB — Not the primary CI system.
# The canonical CI pipeline is .github/workflows/ci.yml.
# This file is maintained for teams that mirror this repo into Azure DevOps or GitLab.

# ──────────────────────────────────────────────────────────────────────────────
# kicad-mcp-pro · Azure Pipelines — Publish to PyPI
#
# ★ MANUAL TRIGGER ONLY — never runs automatically.
# ★ Includes a ManualValidation gate: the pipeline pauses and waits
#   for your explicit approval before uploading to PyPI.
#
# How to run:
#   Azure DevOps → Pipelines → kicad-mcp-publish → Run pipeline
#   Choose the target (PyPI or TestPyPI), then click Run.
#
# Required variable group: "pypi-credentials"
#   PYPI_TOKEN      — token for pypi.org        (mark as secret)
#   TEST_PYPI_TOKEN — token for test.pypi.org   (mark as secret)
#
# Create the variable group once:
#   az pipelines variable-group create \
#     --name pypi-credentials \
#     --authorize true \
#     --variables PYPI_TOKEN="" TEST_PYPI_TOKEN=""
#   Then set the secret values in the Azure DevOps UI.
#
# Publish is intentionally manual and blocked by a human approval stage.
# ──────────────────────────────────────────────────────────────────────────────

trigger: none # ← never auto-trigger
pr: none # ← never trigger on PRs

parameters:
  - name: targetIndex
    displayName: "Target package index"
    type: string
    default: TestPyPI
    values:
      - TestPyPI
      - PyPI

  - name: skipTests
    displayName: "Skip pre-publish tests? (not recommended)"
    type: boolean
    default: false

variables:
  - group: pypi-credentials
  - name: nodeVersion
    value: "24.15.0"

# ── Stage 1: Build ────────────────────────────────────────────────────────────
stages:
  - stage: Build
    displayName: "1 · Build package"
    jobs:
      - job: Build
        displayName: "Build sdist + wheel"
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: self
            fetchDepth: 1

          - task: NodeTool@0
            inputs:
              versionSpec: "$(nodeVersion)"
            displayName: "Use Node.js"

          - bash: |
              curl -LsSf https://astral.sh/uv/install.sh | sh
              echo "##vso[task.prependpath]$HOME/.local/bin"
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
            displayName: "Install uv"

          - script: corepack enable
            displayName: "Enable Corepack"

          - script: corepack npm ci
            displayName: "Install Node hook tooling"

          - script: uv sync --all-extras --frozen
            displayName: "Install dependencies"

          - bash: |
              set -euo pipefail
              RELEASE_VERSION="$(grep -E '^version = "[^"]+"' pyproject.toml | head -1 | cut -d '"' -f2)"
              if [ -z "${RELEASE_VERSION}" ]; then
                echo "Could not resolve release version from pyproject.toml"
                exit 1
              fi
              echo "Resolved release version: ${RELEASE_VERSION}"
              echo "##vso[task.setvariable variable=resolvedReleaseVersion]${RELEASE_VERSION}"
              echo "##vso[task.setvariable variable=resolvedReleaseVersion;isOutput=true]${RELEASE_VERSION}"
            name: resolveVersion
            displayName: "Resolve release version from pyproject"

          - ${{ if not(parameters.skipTests) }}:
              - script: |
                  corepack npm run check:ci
                displayName: "Run local validation gate (pre-publish)"

          - script: corepack npm run build
            displayName: "Build sdist + wheel"

          - bash: |
              echo "========================================="
              echo "Built artifacts:"
              ls -lh dist/
              echo "========================================="
              echo "Version from pyproject.toml:"
              grep '^version' pyproject.toml
              echo "Resolved release version: $(resolvedReleaseVersion)"
            displayName: "Inspect artifacts"

          - task: PublishBuildArtifacts@1
            displayName: "Publish dist/ as pipeline artifact"
            inputs:
              pathtoPublish: dist/
              artifactName: dist-${{ parameters.targetIndex }}

  # ── Stage 2: Manual Approval ─────────────────────────────────────────────────
  - stage: Approve
    displayName: "2 · ★ Await your approval"
    dependsOn: Build
    condition: succeeded()
    variables:
      RESOLVED_RELEASE_VERSION: $[ stageDependencies.Build.Build.outputs['resolveVersion.resolvedReleaseVersion'] ]
    jobs:
      - job: WaitForApproval
        displayName: "Waiting for manual approval..."
        pool: server # agentless job — required for ManualValidation
        timeoutInMinutes: 1440 # 24-hour window; pipeline cancels if not approved
        steps:
          - task: ManualValidation@1
            displayName: "Approve publish to ${{ parameters.targetIndex }}"
            inputs:
              notifyUsers: ""
              instructions: |
                ╔══════════════════════════════════════════════════════╗
                ║      kicad-mcp-pro — PyPI Publish Approval           ║
                ╠══════════════════════════════════════════════════════╣
                ║  Version   : $(RESOLVED_RELEASE_VERSION)             ║
                ║  Target    : ${{ parameters.targetIndex }}            ║
                ║  Skip tests: ${{ parameters.skipTests }}              ║
                ╚══════════════════════════════════════════════════════╝

                Before approving, please verify:
                  ✅  The version number is correct
                  ✅  All CI checks passed on this commit
                  ✅  The built artifacts look correct (check Stage 1)
                  ✅  CHANGELOG.md is up to date

                ▶ Click APPROVE to publish to ${{ parameters.targetIndex }}.
                ✖ Click REJECT to cancel the release.
              onTimeout: reject

  # ── Stage 3: Publish ─────────────────────────────────────────────────────────
  - stage: Publish
    displayName: "3 · Publish to ${{ parameters.targetIndex }}"
    dependsOn: Approve
    condition: succeeded()
    jobs:
      - job: Publish
        displayName: "Upload to ${{ parameters.targetIndex }}"
        pool:
          vmImage: ubuntu-22.04
        steps:
          - checkout: none # no source needed, we use the artifact

          - download: current
            artifact: dist-${{ parameters.targetIndex }}
            displayName: "Download dist artifact"

          - script: pip install twine
            displayName: "Install twine"

          - bash: |
              set -euo pipefail
              TARGET="${{ parameters.targetIndex }}"
              DIST_DIR="$(Pipeline.Workspace)/dist-${TARGET}"

              echo "Publishing the following files to ${TARGET}:"
              ls -lh "${DIST_DIR}/"

              if [ "${TARGET}" = "TestPyPI" ]; then
                REPO_URL="https://test.pypi.org/legacy/"
                TOKEN="$(TEST_PYPI_TOKEN)"
              else
                REPO_URL="https://upload.pypi.org/legacy/"
                TOKEN="$(PYPI_TOKEN)"
              fi

              twine upload \
                --repository-url "${REPO_URL}" \
                --username __token__ \
                --password "${TOKEN}" \
                --non-interactive \
                --verbose \
                "${DIST_DIR}"/*
            displayName: "twine upload → ${{ parameters.targetIndex }}"
            env:
              PYPI_TOKEN: $(PYPI_TOKEN)
              TEST_PYPI_TOKEN: $(TEST_PYPI_TOKEN)

          - bash: |
              TARGET="${{ parameters.targetIndex }}"
              PKG=$(ls $(Pipeline.Workspace)/dist-${TARGET}/*.whl 2>/dev/null | head -1 | xargs basename)
              echo ""
              echo "════════════════════════════════════════"
              if [ "${TARGET}" = "TestPyPI" ]; then
                echo "Published to TestPyPI:"
                echo "  https://test.pypi.org/project/kicad-mcp-pro/"
                echo ""
                echo "Verify with:"
                echo "  pip install --index-url https://test.pypi.org/simple/ kicad-mcp-pro"
              else
                echo "Published to PyPI:"
                echo "  https://pypi.org/project/kicad-mcp-pro/"
                echo ""
                echo "Install with:"
                echo "  pip install kicad-mcp-pro"
                echo "  uvx kicad-mcp-pro"
              fi
              echo "════════════════════════════════════════"
            displayName: "Post-publish summary"

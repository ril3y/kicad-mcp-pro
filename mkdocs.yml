site_name: KiCad MCP Pro
site_url: https://oaslananka-lab.github.io/kicad-mcp-pro
repo_url: https://github.com/oaslananka-lab/kicad-mcp-pro
repo_name: oaslananka-lab/kicad-mcp-pro
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - redirects
  - minify:
      minify_html: true
  - glightbox
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Installation: installation.md
  - Client Configuration: client-configuration.md
  - Configuration: configuration.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Comparison: comparison.md
  - Tools Reference: tools-reference.md
  - API Stability: api-stability.md
  - Maintenance Policy: maintenance-policy.md
  - Workflow Security: workflow-security.md
  - Publishing: publishing.md
  - Demo Media: demo-media.md
  - Automation:
      - Jules: automation/jules.md
  - Install:
      - Docker: install/docker.md
      - Client Config Generator: install/client-config-generator.md
  - KiCad 10:
      - Variants: kicad10/variants.md
      - Time-Domain Tuning: kicad10/time-domain.md
      - Graphical DRC: kicad10/graphical-drc.md
  - Integration:
      - KiCad Studio: integration/kicad-studio.md
      - Claude Desktop: integration/claude-desktop.md
      - Cursor: integration/cursor.md
      - Claude Code: integration/claude-code.md
  - Deployment:
      - Repository and CI/CD Topology: deployment/repository-topology.md
      - Autonomy Model: autonomy.md
      - Repository Operations: repository-operations.md
      - Doppler Setup: doppler-setup.md
      - Branch Protection: branch-protection.md
      - Jules CI Bridge: deployment/jules-ci-bridge.md
      - Azure DevOps CI/CD: deployment/azure-devops.md
      - Docker: deployment/docker.md
      - HTTP Mode: deployment/http-mode.md
      - Security: deployment/security.md
      - Threat Model: security/threat-model.md
      - Release Integrity: security/release-integrity.md
      - Release Process: release-process.md

name: Mirror canonical repo to personal showcase

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the mirror plan without pushing"
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      force_mirror:
        description: "Use force-with-lease for manual recovery only"
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      ref_scope:
        description: "Refs to mirror"
        type: choice
        default: main-and-tags
        options:
          - main
          - tags
          - main-and-tags
      tag_name:
        description: "Optional single v-prefixed tag to mirror or recover"
        required: false
        type: string
      approval:
        description: "Type MIRROR_CANONICAL_TO_PERSONAL for force recovery"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: mirror-personal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror main and tags to personal showcase
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout canonical repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Preflight and mirror safe refs
        env:
          PERSONAL_REPO_PUSH_TOKEN: ${{ secrets.PERSONAL_REPO_PUSH_TOKEN }}
          INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          INPUT_FORCE_MIRROR: ${{ github.event_name == 'workflow_dispatch' && inputs.force_mirror || 'false' }}
          INPUT_REF_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.ref_scope || 'main-and-tags' }}
          INPUT_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || '' }}
          INPUT_APPROVAL: ${{ github.event_name == 'workflow_dispatch' && inputs.approval || '' }}
        run: |
          set -euo pipefail
          if [ -z "${PERSONAL_REPO_PUSH_TOKEN}" ]; then
            echo "::error::PERSONAL_REPO_PUSH_TOKEN is required."
            exit 1
          fi

          dry_run="${INPUT_DRY_RUN}"
          force_mirror="${INPUT_FORCE_MIRROR}"
          ref_scope="${INPUT_REF_SCOPE}"
          tag_name="${INPUT_TAG_NAME}"
          approval="${INPUT_APPROVAL}"

          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            dry_run="false"
            force_mirror="false"
            approval=""
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              ref_scope="tags"
              tag_name="${GITHUB_REF_NAME}"
            fi
          fi

          if [ -n "${tag_name}" ] && ! [[ "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::tag_name must be a v-prefixed semantic tag when provided, got ${tag_name}."
            exit 1
          fi

          if [ "${force_mirror}" = "true" ]; then
            if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
              echo "::error::force_mirror is allowed only for manual workflow_dispatch runs."
              exit 1
            fi
            if [ "${approval}" != "MIRROR_CANONICAL_TO_PERSONAL" ]; then
              echo "::error::force_mirror requires approval=MIRROR_CANONICAL_TO_PERSONAL."
              exit 1
            fi
          fi

          git remote add personal \
            "https://x-access-token:${PERSONAL_REPO_PUSH_TOKEN}@github.com/oaslananka/kicad-mcp-pro.git"
          git fetch origin main --no-tags --prune
          git fetch personal main --no-tags --prune || true

          echo "Mirror mode: dry_run=${dry_run}, force_mirror=${force_mirror}, ref_scope=${ref_scope}, tag_name=${tag_name:-all v*.*.* tags}"
          echo
          echo "Commits not yet present on personal/main:"
          git log --oneline refs/remotes/personal/main..refs/remotes/origin/main || true
          echo
          echo "Tags pointing at the checked-out commit:"
          git tag --points-at HEAD || true

          personal_main_sha="$(git rev-parse --verify refs/remotes/personal/main 2>/dev/null || true)"
          canonical_main_sha="$(git rev-parse --verify refs/remotes/origin/main)"
          main_push_needed="false"
          main_diverged="false"
          if [ -n "${personal_main_sha}" ]; then
            if [ "${personal_main_sha}" != "${canonical_main_sha}" ]; then
              main_push_needed="true"
              if ! git merge-base --is-ancestor refs/remotes/personal/main refs/remotes/origin/main; then
                main_diverged="true"
              fi
            fi
          else
            main_push_needed="true"
          fi

          canonical_tags=()
          if [ "${ref_scope}" = "tags" ] || [ "${ref_scope}" = "main-and-tags" ]; then
            mapfile -t canonical_tags < <(
              if [ -n "${tag_name}" ]; then
                git tag -l "${tag_name}"
              else
                git tag -l 'v*.*.*' --sort=v:refname
              fi
            )
            if [ -n "${tag_name}" ] && [ "${#canonical_tags[@]}" -eq 0 ]; then
              echo "::error::Canonical tag ${tag_name} does not exist in this checkout."
              exit 1
            fi
          fi
          declare -a missing_tags=()
          declare -a divergent_tags=()
          declare -a synced_tags=()
          for tag in "${canonical_tags[@]}"; do
            [ -z "${tag}" ] && continue
            canonical_tag_sha="$(git rev-parse "refs/tags/${tag}")"
            personal_tag_sha="$(git ls-remote personal "refs/tags/${tag}" | awk '$2 !~ /\^\{\}$/ { print $1; exit }')"
            if [ -z "${personal_tag_sha}" ]; then
              missing_tags+=("${tag}")
            elif [ "${personal_tag_sha}" = "${canonical_tag_sha}" ]; then
              synced_tags+=("${tag}")
            else
              divergent_tags+=("${tag}")
            fi
          done

          {
            echo "## Personal Mirror Preflight"
            echo
            echo "- Dry run: ${dry_run}"
            echo "- Force mirror: ${force_mirror}"
            echo "- Ref scope: ${ref_scope}"
            echo "- Main needs push: ${main_push_needed}"
            echo "- Main diverged: ${main_diverged}"
            echo "- Missing tags: ${#missing_tags[@]}"
            echo "- Divergent tags: ${#divergent_tags[@]}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${main_diverged}" = "true" ] && [ "${force_mirror}" != "true" ]; then
            echo "::error::Personal showcase main diverges from canonical main. Manual force_mirror recovery is required after approval."
            exit 1
          fi

          if [ "${#divergent_tags[@]}" -gt 0 ]; then
            printf 'Divergent personal showcase tags:\n'
            printf -- '- %s\n' "${divergent_tags[@]}"
            if [ "${force_mirror}" != "true" ]; then
              recovery_tag="${divergent_tags[0]}"
              echo "::error::Personal showcase tag divergence detected. Run mirror-personal.yml with force_mirror=true and tag_name=${recovery_tag} after approval."
              exit 1
            fi
            if [ -z "${tag_name}" ]; then
              echo "::error::force_mirror for divergent tags requires a single tag_name."
              exit 1
            fi
          fi

          should_push_main="false"
          if [ "${ref_scope}" = "main" ] || [ "${ref_scope}" = "main-and-tags" ]; then
            should_push_main="${main_push_needed}"
          fi

          should_push_tags="false"
          if [ "${ref_scope}" = "tags" ] || [ "${ref_scope}" = "main-and-tags" ]; then
            if [ "${#missing_tags[@]}" -gt 0 ] || [ "${#divergent_tags[@]}" -gt 0 ]; then
              should_push_tags="true"
            fi
          fi

          if [ "${dry_run}" = "true" ]; then
            echo "Dry run only. Planned ref updates:"
            if [ "${should_push_main}" = "true" ]; then
              echo "- main: ${personal_main_sha:-missing} -> ${canonical_main_sha}"
            fi
            for tag in "${missing_tags[@]}"; do
              echo "- ${tag}: missing -> $(git rev-parse "refs/tags/${tag}")"
            done
            for tag in "${divergent_tags[@]}"; do
              echo "- ${tag}: force-with-lease recovery required"
            done
            exit 0
          fi

          if [ "${should_push_main}" = "true" ]; then
            if [ "${force_mirror}" = "true" ]; then
              echo "Force-with-lease updating personal main."
              git push --force-with-lease="refs/heads/main:${personal_main_sha}" \
                personal refs/remotes/origin/main:refs/heads/main
            else
              echo "Fast-forwarding personal main."
              git push personal refs/remotes/origin/main:refs/heads/main
            fi
          else
            echo "Personal main is already synchronized or outside ref_scope."
          fi

          if [ "${should_push_tags}" = "true" ]; then
            for tag in "${missing_tags[@]}"; do
              echo "Pushing missing tag ${tag}."
              git push personal "refs/tags/${tag}:refs/tags/${tag}"
            done
            for tag in "${divergent_tags[@]}"; do
              personal_tag_sha="$(git ls-remote personal "refs/tags/${tag}" | awk '$2 !~ /\^\{\}$/ { print $1; exit }')"
              echo "Force-with-lease updating divergent tag ${tag}."
              git push --force-with-lease="refs/tags/${tag}:${personal_tag_sha}" \
                personal "refs/tags/${tag}:refs/tags/${tag}"
            done
          else
            echo "No tag updates are needed or tags are outside ref_scope."
          fi

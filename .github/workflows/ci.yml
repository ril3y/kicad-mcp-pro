name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      HUSKY: 0
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: npm
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        if: matrix.os == 'ubuntu-latest'
        with:
          go-version: stable
      - name: Install workflow lint tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"
      - name: Install dependencies
        run: |
          corepack enable
          corepack npm ci
          uv sync --all-extras --frozen
      - name: Run full CI tasks
        if: matrix.os == 'ubuntu-latest'
        run: corepack npm run check:ci
      - name: Run cross-platform smoke tasks
        if: matrix.os != 'ubuntu-latest'
        run: |
          corepack npm run check:metadata
          corepack npm run lint
          corepack npm run format:check
          corepack npm run typecheck
          corepack npm run test:unit
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '' || secrets.CODECOV_TOKEN }}
      - name: Publish test results
        if: always() && hashFiles('**/junit.xml', '**/test-results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        with:
          files: |
            **/junit.xml
            **/test-results.xml
      - name: Test summary
        if: always() && hashFiles('**/junit.xml') != ''
        shell: python
        run: |
          import glob
          import os
          import xml.etree.ElementTree as ET

          totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0}
          rows = []
          for path in glob.glob("**/junit.xml", recursive=True):
              root = ET.parse(path).getroot()
              suites = root.findall("testsuite") if root.tag == "testsuites" else [root]
              for suite in suites:
                  tests = int(suite.attrib.get("tests", "0"))
                  failures = int(suite.attrib.get("failures", "0"))
                  errors = int(suite.attrib.get("errors", "0"))
                  skipped = int(suite.attrib.get("skipped", "0"))
                  totals["tests"] += tests
                  totals["failures"] += failures
                  totals["errors"] += errors
                  totals["skipped"] += skipped
                  rows.append((path, suite.attrib.get("name", path), tests, failures, errors, skipped))

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Test summary\n\n")
              summary.write(
                  f"Total: {totals['tests']} tests, {totals['failures']} failures, "
                  f"{totals['errors']} errors, {totals['skipped']} skipped.\n\n"
              )
              summary.write("| File | Suite | Tests | Failures | Errors | Skipped |\n")
              summary.write("|---|---|---:|---:|---:|---:|\n")
              for file_name, suite_name, tests, failures, errors, skipped in rows:
                  summary.write(
                      f"| `{file_name}` | {suite_name} | {tests} | {failures} | {errors} | {skipped} |\n"
                  )

  ci:
    name: CI
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - validate
    permissions:
      contents: read
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "CI matrix failed: ${{ needs.validate.result }}"
            exit 1
          fi
          echo "CI matrix passed."

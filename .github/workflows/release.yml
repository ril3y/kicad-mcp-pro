name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example v3.0.3"
        required: true
      index:
        description: "Package index"
        type: choice
        default: "TestPyPI"
        options:
          - TestPyPI
          - PyPI
      publish:
        description: "Actually publish to registries"
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      approval:
        description: "Type APPROVE_RELEASE to confirm publishing"
        required: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  EFFECTIVE_VERSION: ${{ inputs.version || github.ref_name }}
  EFFECTIVE_PUBLISH: ${{ github.event_name == 'push' && (vars.AUTO_RELEASE_PUBLISH || 'false') || inputs.publish || 'false' }}
  EFFECTIVE_INDEX: ${{ github.event_name == 'push' && (vars.AUTO_RELEASE_INDEX || 'PyPI') || inputs.index || 'TestPyPI' }}

jobs:
  release:
    name: Release
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.EFFECTIVE_VERSION }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release target
        run: |
          set -euo pipefail
          version="${EFFECTIVE_VERSION#v}"
          if ! [[ "${EFFECTIVE_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release version must be a v-prefixed semantic tag, got: ${EFFECTIVE_VERSION}" >&2
            exit 1
          fi
          case "${EFFECTIVE_INDEX}" in
            PyPI|TestPyPI) ;;
            *)
              echo "Unsupported release index: ${EFFECTIVE_INDEX}" >&2
              exit 1
              ;;
          esac
          if [ "${EFFECTIVE_PUBLISH}" != "true" ] && [ "${EFFECTIVE_PUBLISH}" != "false" ]; then
            echo "EFFECTIVE_PUBLISH must be true or false, got: ${EFFECTIVE_PUBLISH}" >&2
            exit 1
          fi
          echo "Release target: ${EFFECTIVE_VERSION} (${version}) on ${EFFECTIVE_INDEX}; publish=${EFFECTIVE_PUBLISH}."

      - name: Validate approval
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_PUBLISH: ${{ env.EFFECTIVE_PUBLISH }}
          RELEASE_APPROVAL: ${{ inputs.approval }}
        run: |
          if [ "${RELEASE_PUBLISH}" = "true" ] && [ "${RELEASE_APPROVAL}" != "APPROVE_RELEASE" ]; then
            echo "Set approval=APPROVE_RELEASE to publish." >&2
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
          enable-cache: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: stable
          cache: false

      - name: Install workflow lint tools
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Install dependencies
        run: |
          corepack enable
          corepack npm ci
          uv sync --all-extras --frozen

      - name: Test
        run: corepack npm run check:ci

      - name: Build
        run: corepack npm run build

      - name: Stage Python distributions for package index
        run: |
          set -euo pipefail
          rm -rf dist-pypi
          mkdir -p dist-pypi
          python - <<'PY'
          from pathlib import Path
          import shutil

          source = Path("dist")
          target = Path("dist-pypi")
          packages = sorted(source.glob("*.whl")) + sorted(source.glob("*.tar.gz"))
          if not packages:
              raise SystemExit("No Python wheel or source distribution found in dist/.")
          for package in packages:
              shutil.copy2(package, target / package.name)
          print("Staged Python distributions:")
          for package in packages:
              print(f"- {target / package.name}")
          PY

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/bom.json
          upload-artifact: false

      - name: Calculate checksums
        run: |
          cd dist
          sha256sum -- * > SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt

      - name: Clear project virtualenv for signing action
        run: |
          rm -rf .venv

      - name: Sign release artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc
        env:
          # The project setup-uv step exports Python 3.12 settings for package
          # checks. The pinned Sigstore action bootstraps its own Python 3.14
          # environment, so isolate uv to keep the action self-contained.
          UV_NO_CONFIG: "1"
          UV_CACHE_DIR: ${{ runner.temp }}/sigstore-uv-cache
          UV_PYTHON: "3.14"
          UV_PYTHON_INSTALL_DIR: ${{ runner.temp }}/sigstore-uv-python-dir
          VIRTUAL_ENV: ""
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
            dist/bom.json
            dist/SHA256SUMS.txt
          upload-signing-artifacts: true

      - name: Publish to PyPI
        if: env.EFFECTIVE_PUBLISH == 'true' && env.EFFECTIVE_INDEX == 'PyPI'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist-pypi/
          skip-existing: true

      - name: Publish to TestPyPI
        if: env.EFFECTIVE_PUBLISH == 'true' && env.EFFECTIVE_INDEX == 'TestPyPI'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist-pypi/
          skip-existing: true

      - name: Post-publish smoke check
        if: env.EFFECTIVE_PUBLISH == 'true'
        run: |
          set -euo pipefail
          version="$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          case "${RELEASE_INDEX}" in
            PyPI)
              index_url="https://pypi.org/simple/"
              ;;
            TestPyPI)
              index_url="https://test.pypi.org/simple/"
              ;;
            *)
              echo "::error::Unsupported release index: ${RELEASE_INDEX}"
              exit 1
              ;;
          esac
          pip_args=(--index-url "${index_url}")
          if [ "${RELEASE_INDEX}" = "TestPyPI" ]; then
            pip_args+=(--extra-index-url "https://pypi.org/simple/")
          fi
          echo "Waiting for ${RELEASE_INDEX} simple index propagation..."
          for attempt in {1..10}; do
            if python -m pip install "${pip_args[@]}" \
              "kicad-mcp-pro==${version}" \
              --dry-run; then
              echo "Smoke check passed: kicad-mcp-pro ${version} is available on ${RELEASE_INDEX}."
              exit 0
            fi
            if [ "${attempt}" -lt 10 ]; then
              echo "Smoke check attempt ${attempt}/10 failed; retrying in 30 s..."
              sleep 30
            fi
          done
          echo "::error::Smoke check failed: kicad-mcp-pro ${version} was not available on ${RELEASE_INDEX} after 10 attempts."
          exit 1
        env:
          RELEASE_INDEX: ${{ env.EFFECTIVE_INDEX }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist-${{ env.EFFECTIVE_VERSION }}
          path: dist/
          retention-days: 14

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN || github.token }}
          RELEASE_VERSION: ${{ env.EFFECTIVE_VERSION }}
          RELEASE_PUBLISH: ${{ env.EFFECTIVE_PUBLISH }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          edit_args=(
            --repo "${RELEASE_REPOSITORY}"
            --title "${RELEASE_VERSION}"
          )
          create_args=(
            "${edit_args[@]}"
            --generate-notes
            --target "$target_sha"
          )
          if [ "${RELEASE_PUBLISH}" != "true" ]; then
            edit_args+=(--draft)
            create_args+=(--draft)
          else
            edit_args+=(--draft=false)
          fi
          assets=()
          if compgen -G "dist/*" > /dev/null; then
            assets+=(dist/*)
          fi
          if gh release view "${RELEASE_VERSION}" --repo "${RELEASE_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_VERSION}" "${edit_args[@]}"
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release upload "${RELEASE_VERSION}" --repo "${RELEASE_REPOSITORY}" "${assets[@]}" --clobber
            fi
          else
            gh release create "${RELEASE_VERSION}" "${create_args[@]}" "${assets[@]}"
          fi


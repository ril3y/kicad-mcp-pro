name: Mutation Testing

on:
  schedule:
    - cron: "25 6 1 * *"
  workflow_dispatch:

jobs:
  mutmut:
    name: Mutation Testing
    if: github.repository == 'oaslananka-lab/kicad-mcp-pro'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --frozen
      - name: Run scoped mutation baseline
        continue-on-error: true
        run: >
          uv run mutmut run
          --paths-to-mutate src/kicad_mcp/utils,src/kicad_mcp/discovery.py,src/kicad_mcp/connection.py,src/kicad_mcp/tools/router.py
      - name: Export mutation results
        if: always()
        run: uv run mutmut results > mutmut-results.txt || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mutmut-results
          path: mutmut-results.txt
          retention-days: 30
